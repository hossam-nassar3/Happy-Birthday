<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Hajer ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.container {
    text-align: center;
    z-index: 10;
    padding: 20px;
}

h1 {
    color: white;
    font-size: 2.5rem;
    margin-bottom: 25px;
    min-height: 80px;
}

button {
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
}

#thanksBtn {
    padding: 15px 40px;
    font-size: 20px;
    background: white;
    color: #ff4f81;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

#yesBtn {
    padding: 20px 50px;
    font-size: 24px;
    background: #ff4f81;
    color: white;
    margin: 20px;
}

#noBtn {
    padding: 8px 15px;
    font-size: 12px;
    background: white;
    color: #ff4f81;
    position: absolute;
}

.hidden {
    display: none;
}

.heart {
    position: absolute;
    color: rgba(255,255,255,0.8);
    animation: floatUp linear infinite;
    font-size: 20px;
}

@keyframes floatUp {
    0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
    }
    30% {
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
    }
}

.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    from {
        transform: translateY(-100px) rotate(0deg);
    }
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<div id="hearts"></div>

<div class="container" id="page1">
    <h1 id="typewriter"></h1>
    <button id="thanksBtn">Thanks ❤️</button>
</div>

<div class="container hidden" id="page2">
    <h1>Your tomorrow's morning coffee is on me, OK? ☕❤️</h1>
    <button id="yesBtn">I would love to</button>
    <button id="noBtn">No thanks</button>
</div>

<script>
const text = "Happy Birthday to you Hajer! 🎂❤️";
const typewriter = document.getElementById("typewriter");
const thanksBtn = document.getElementById("thanksBtn");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const music = document.getElementById("bgMusic");

let index = 0;
let growSize = 1;

// Typewriter effect
function typeEffect() {
    if(index < text.length){
        typewriter.innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 100);
    }
}
typeEffect();

// Floating hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 4 + 3) + "s";
    heart.style.fontSize = (Math.random() * 20 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 7000);
}
setInterval(createHeart, 400);

// Confetti
function launchConfetti() {
    for(let i = 0; i < 100; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 3000);
    }
}

thanksBtn.onclick = () => {
    music.play();
    launchConfetti();
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
    moveNoButton();
};

function moveNoButton() {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

noBtn.addEventListener("mouseover", () => {
    moveNoButton();
    growSize += 0.4;
    yesBtn.style.transform = `scale(${growSize})`;

    if(growSize >= 5){
        yesBtn.style.position = "fixed";
        yesBtn.style.top = "50%";
        yesBtn.style.left = "50%";
        yesBtn.style.transform = "translate(-50%, -50%) scale(7)";
    }
});

yesBtn.onclick = () => {
    let order = prompt("Write down your coffee order here ☕❤️");

    if(order){
        const phone = "201285807388";
        const msg = `Hey Hossam ❤️ My order is: ${order}`;
        const whatsappURL =
            `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;

        alert("Take a screenshot and send it too 😍");
        window.open(whatsappURL, "_blank");
    }
};
</script>

</body>
</html>
